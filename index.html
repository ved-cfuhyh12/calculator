<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Calculator</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#f1f5f9;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .calculator{
        width:400px;
        background:#fff;
        padding:25px;
        border-radius:15px;
        box-shadow:0 0 15px rgba(0,0,0,0.2);
    }

    .calculator h1{
        text-align:center;
        margin-bottom:20px;
        color:#333;
    }

    input,select{
        width:100%;
        padding:12px;
        margin:10px 0;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;
    }

    button{
        width:100%;
        padding:12px;
        background:#007bff;
        color:white;
        border:none;
        border-radius:8px;
        font-size:18px;
        cursor:pointer;
        transition:.3s;
    }

    button:hover{
        background:#0056b3;
    }

    .result{
        margin-top:20px;
        background:#f8f9fa;
        padding:15px;
        border-radius:10px;
    }

    .result h2{
        margin:8px 0;
        color:#333;
    }
</style>

</head>
<body>

<div class="calculator">

    <h1>Simple Calculator</h1>

    <input type="number" id="a" placeholder="Enter A Value">

    <input type="number" id="b" placeholder="Enter B Value">

    <select id="operation">
        <option value="">Choose Operation</option>
        <option value="add">Addition (+)</option>
        <option value="sub">Subtraction (-)</option>
        <option value="mul">Multiplication (×)</option>
        <option value="div">Division (÷)</option>
    </select>

    <button onclick="calculate()">Calculate</button>

    <div class="result">
        <h2 id="heading1">A Value :</h2>
        <h2 id="heading2">B Value :</h2>
        <h2 id="heading">Result :</h2>
    </div>

</div>

<script>

function calculate()
{
    var a=document.getElementById("a").value;
    var b=document.getElementById("b").value;
    var operation=document.getElementById("operation").value;

    document.getElementById("heading1").innerText="A Value : "+a;
    document.getElementById("heading2").innerText="B Value : "+b;

    var heading=document.getElementById("heading");

    switch(operation)
    {
        case "add":
            heading.innerText="Addition : "+(Number(a)+Number(b));
            break;

        case "sub":
            heading.innerText="Subtraction : "+(Number(a)-Number(b));
            break;

        case "mul":
            heading.innerText="Multiplication : "+(Number(a)*Number(b));
            break;

        case "div":
            if(Number(b)==0)
            {
                heading.innerText="Cannot divide by zero";
            }
            else
            {
                heading.innerText="Division : "+(Number(a)/Number(b));
            }
            break;

        default:
            heading.innerText="Please select an operation.";
    }
}

</script>

</body>
</html>
